<mat-card class="trip-card" appearance="outlined">
  <img [src]="imageUrl()" [alt]="trip().destination_city" loading="lazy" (error)="useFallbackImage($event)">

  <mat-card-content>
    <div class="card-head">
      <div>
        <span>{{ trip().destination_country }}</span>
        <strong>{{ trip().destination_city }}</strong>
      </div>
      @if (trip().budget) {
        <b>{{ +trip().budget! | currency:'USD':'symbol':'1.0-0' }}</b>
      }
    </div>

    <div class="meta">
      <span>{{ travelPeriod() }}</span>
    </div>

    @if (trip().description) {
      <p>{{ trip().description }}</p>
    }

    <div class="actions">
      <a mat-flat-button color="primary" [routerLink]="['/trips', trip().id]">Detalhes</a>
      <button mat-stroked-button type="button" (click)="removed.emit(trip().id)">Excluir</button>
    </div>
  </mat-card-content>
</mat-card>
