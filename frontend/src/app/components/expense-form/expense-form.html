<mat-card class="expense-form-card" appearance="outlined">
  <form [formGroup]="form" (ngSubmit)="submit()">
    <mat-form-field appearance="outline">
      <mat-label>Viagem</mat-label>
      <mat-select formControlName="trip_id">
        @for (trip of trips(); track trip.id) {
          <mat-option [value]="trip.id">{{ trip.destination_city }} - {{ trip.destination_country }}</mat-option>
        }
      </mat-select>
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Categoria</mat-label>
      <mat-select formControlName="category">
        @for (category of categories; track category) {
          <mat-option [value]="category">{{ category }}</mat-option>
        }
      </mat-select>
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Valor</mat-label>
      <input matInput type="number" min="0" formControlName="amount">
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Data</mat-label>
      <input matInput type="date" formControlName="expense_date">
    </mat-form-field>

    <mat-form-field class="wide" appearance="outline">
      <mat-label>Descricao</mat-label>
      <input matInput formControlName="description">
    </mat-form-field>

    <div class="actions">
      <button mat-flat-button color="primary" type="submit" [disabled]="loading() || !trips().length">
        {{ loading() ? 'Salvando...' : expense() ? 'Atualizar despesa' : 'Adicionar despesa' }}
      </button>
      @if (expense()) {
        <button mat-stroked-button type="button" (click)="cancelled.emit()">Cancelar</button>
      }
    </div>
  </form>
</mat-card>
