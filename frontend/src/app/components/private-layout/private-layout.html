<section class="private-shell" [class.sidebar-hidden]="sidebarHidden()" [class.drawer-open]="drawerOpen()">
  <aside class="sidebar">
    <a class="brand" routerLink="/">
      <span>T</span>
      <strong>Travel Planner</strong>
    </a>

    <nav aria-label="Navegação privada">
      @for (item of navItems; track item.link) {
        <a
          [routerLink]="item.link"
          routerLinkActive="active"
          [routerLinkActiveOptions]="{ exact: item.link === '/' || item.link === '/dashboard' }"
          (click)="drawerOpen.set(false)"
        >
          <b aria-hidden="true">{{ item.icon }}</b>
          <span>{{ item.label }}</span>
        </a>
      }
    </nav>

    <button class="logout-link" type="button" (click)="logout()">
      <b aria-hidden="true">⎋</b>
      <span>Terminar sessão</span>
    </button>
  </aside>

  <div class="content-shell">
    <header class="private-topbar">
      <button class="hamburger" type="button" [attr.aria-label]="drawerOpen() ? 'Fechar menu' : 'Abrir menu'" (click)="toggleDrawer()">
        <span></span><span></span><span></span>
      </button>

      <div class="topbar-actions">
        <div class="nav-search">
          <span aria-hidden="true">⌕</span>
          <input
            #globalSearch
            type="text"
            placeholder="Pesquisar viagem..."
            autocomplete="off"
            (keydown.enter)="searchTrips(globalSearch.value)"
          >
        </div>

        <select [value]="currency.currency()" aria-label="Moeda" (change)="setCurrency($any($event.target).value)">
          @for (option of currency.options; track option.code) {
            <option [value]="option.code">{{ option.code }}</option>
          }
        </select>

        <app-language-toggle />
        <app-theme-toggle />

        <div class="user-menu" (click)="$event.stopPropagation()">
          <button class="avatar-button" type="button" (click)="userMenuOpen.set(!userMenuOpen())">
            @if (auth.currentUser()?.avatar) {
              <img [src]="auth.currentUser()?.avatar" alt="Avatar">
            } @else {
              <span>{{ initials() }}</span>
            }
          </button>

          @if (userMenuOpen()) {
            <div class="dropdown">
              <strong>{{ auth.currentUser()?.name || 'Utilizador' }}</strong>
              <span>{{ auth.currentUser()?.email || 'Sessão ativa' }}</span>
              <a routerLink="/profile">Perfil</a>
              <button type="button" (click)="logout()">Terminar sessão</button>
            </div>
          }
        </div>
      </div>
    </header>

    <router-outlet />
  </div>

  @if (drawerOpen()) {
    <button class="drawer-backdrop" type="button" aria-label="Fechar menu" (click)="drawerOpen.set(false)"></button>
  }
</section>
