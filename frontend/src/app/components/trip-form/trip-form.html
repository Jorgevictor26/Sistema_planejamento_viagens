<mat-card class="trip-form-card" appearance="outlined">
  <form [formGroup]="form" (ngSubmit)="submit()">
    <div class="form-grid">
      <mat-form-field appearance="outline">
        <mat-label>Destino</mat-label>
        <input matInput formControlName="destination_city">
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Pais</mat-label>
        <input matInput formControlName="destination_country">
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Latitude</mat-label>
        <input matInput type="number" formControlName="latitude">
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Longitude</mat-label>
        <input matInput type="number" formControlName="longitude">
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Data inicial</mat-label>
        <input matInput type="date" formControlName="start_date">
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Data final</mat-label>
        <input matInput type="date" formControlName="end_date">
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Orcamento</mat-label>
        <input matInput type="number" min="0" formControlName="budget">
      </mat-form-field>

      <div class="upload-field">
        <app-upload-box
          accept="image/*"
          [multiple]="true"
          label="Imagem da viagem"
          hint="Arraste uma ou mais imagens"
          (filesSelected)="onFilesSelected($event)"
        />
      </div>
    </div>

    <mat-form-field appearance="outline">
      <mat-label>Descricao</mat-label>
      <textarea matInput rows="4" formControlName="description"></textarea>
    </mat-form-field>

    <div class="actions">
      <button mat-flat-button color="primary" type="submit" [disabled]="loading()">
        {{ loading() ? 'Salvando...' : 'Salvar viagem' }}
      </button>
      <button mat-stroked-button type="button" (click)="cancelled.emit()">Cancelar</button>
    </div>
  </form>
</mat-card>
