<section class="chart-panel">
  <div class="totals">
    <div>
      <span>Total gasto</span>
      <strong>{{ total() | currency:'USD':'symbol':'1.2-2' }}</strong>
    </div>
    <div>
      <span>Saldo restante</span>
      <strong [class.negative]="remaining() !== null && remaining()! < 0">
        {{ remaining() === null ? 'Sem orçamento' : (remaining()! | currency:'USD':'symbol':'1.2-2') }}
      </strong>
    </div>
  </div>

  <div class="bars">
    @for (row of rows(); track row.category) {
      <div class="bar-row">
        <div class="label">
          <span>{{ row.category }}</span>
          <b>{{ row.total | currency:'USD':'symbol':'1.0-0' }}</b>
        </div>
        <div class="track">
          <div class="fill" [style.width.%]="row.percent"></div>
        </div>
      </div>
    }
  </div>
</section>
