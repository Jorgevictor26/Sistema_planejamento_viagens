<section class="popular">
  <div class="section-heading">
    <span>Recomendacoes</span>
    <h2>Destinos populares</h2>
  </div>

  <div class="grid">
    @for (destination of destinations; track destination.id) {
      <app-destination-card [destination]="destination" (selected)="selected.emit($event)" />
    }
  </div>
</section>
