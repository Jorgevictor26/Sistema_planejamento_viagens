<nav class="navbar" [class.scrolled]="scrolled()" [class.menu-open]="menuOpen()">
  <a class="brand" routerLink="/">
    <span aria-hidden="true">T</span>
    <strong>Travel Planner</strong>
  </a>

  <button class="menu-button" type="button" aria-label="Abrir menu" (click)="menuOpen.set(!menuOpen())">
    <span></span>
    <span></span>
    <span></span>
  </button>

  <div class="nav-panel">
    <div class="links">
      <a href="#destinos" (click)="closeMenu()">{{ language.t('navExplore') }}</a>
      <a href="#sobre" (click)="closeMenu()">{{ language.t('navAbout') }}</a>
    </div>

    <div class="actions">
      <select [value]="language.language()" aria-label="Idioma" (change)="language.setLanguage($any($event.target).value)">
        <option value="pt">PT</option>
        <option value="en">EN</option>
      </select>
      <app-theme-toggle />
      @if (auth.isAuthenticated()) {
        <a mat-button routerLink="/dashboard" (click)="closeMenu()">Dashboard</a>
        <a mat-flat-button color="primary" routerLink="/trips" (click)="closeMenu()">Minhas viagens</a>
      } @else {
        <a mat-button routerLink="/login" (click)="closeMenu()">{{ language.t('navLogin') }}</a>
        <a mat-flat-button color="primary" routerLink="/register" (click)="closeMenu()">{{ language.t('navRegister') }}</a>
      }
    </div>
  </div>
</nav>
