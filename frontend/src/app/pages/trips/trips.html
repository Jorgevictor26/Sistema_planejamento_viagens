<app-navbar />

<main class="trips-shell">
  <header class="page-head">
    <div>
      <span class="eyebrow">Viagens</span>
      <h1>Planejamento de viagens</h1>
    </div>
    <a mat-flat-button color="primary" routerLink="/trips/new">Nova viagem</a>
  </header>

  <mat-card class="filters-card" appearance="outlined">
    <form [formGroup]="filters" (ngSubmit)="load()">
      <mat-form-field appearance="outline">
        <mat-label>Pesquisar</mat-label>
        <input matInput formControlName="q" placeholder="Cidade ou pais">
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Pais</mat-label>
        <input matInput formControlName="country">
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>De</mat-label>
        <input matInput type="date" formControlName="from">
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Ate</mat-label>
        <input matInput type="date" formControlName="to">
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Ordenar por</mat-label>
        <mat-select formControlName="sort">
          <mat-option value="created_at">Criacao</mat-option>
          <mat-option value="start_date">Data inicial</mat-option>
          <mat-option value="budget">Orcamento</mat-option>
          <mat-option value="destination_city">Destino</mat-option>
        </mat-select>
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Direcao</mat-label>
        <mat-select formControlName="direction">
          <mat-option value="desc">Decrescente</mat-option>
          <mat-option value="asc">Crescente</mat-option>
        </mat-select>
      </mat-form-field>

      <div class="filter-actions">
        <button mat-flat-button color="primary" type="submit">Filtrar</button>
        <button mat-stroked-button type="button" (click)="clearFilters()">Limpar</button>
      </div>
    </form>
  </mat-card>

  @if (error()) {
    <p class="error">{{ error() }}</p>
  }

  <app-trip-list [trips]="trips()" [loading]="loading()" (removed)="deleteTrip($event)" />

  @if (pagination(); as page) {
    <nav class="pager" aria-label="Paginacao">
      <button mat-stroked-button type="button" [disabled]="!page.prev_page_url" (click)="load(page.current_page - 1)">Anterior</button>
      <span>Pagina {{ page.current_page }} de {{ page.last_page }}</span>
      <button mat-stroked-button type="button" [disabled]="!page.next_page_url" (click)="load(page.current_page + 1)">Proxima</button>
    </nav>
  }
</main>
