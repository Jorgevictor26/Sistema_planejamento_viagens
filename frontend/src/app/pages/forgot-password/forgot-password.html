<main class="auth-shell">
  <section class="auth-copy">
    <div class="brand-row">
      <span class="brand-mark">TV</span>
      <app-theme-toggle />
    </div>
    <h1>Recupere o acesso.</h1>
    <p>Informe seu email e volte para seus planos sem perder o fio da viagem.</p>
    <div class="travel-photo" role="img" aria-label="Mapa e caderno de viagem sobre a mesa"></div>
  </section>

  <mat-card class="auth-card" appearance="outlined">
    <mat-card-header>
      <mat-card-title>Recuperar senha</mat-card-title>
      <mat-card-subtitle>Enviaremos as instrucoes por email</mat-card-subtitle>
    </mat-card-header>

    <mat-card-content>
      <form [formGroup]="form" (ngSubmit)="submit()">
        <mat-form-field appearance="outline">
          <mat-label>Email</mat-label>
          <input matInput type="email" formControlName="email" autocomplete="email">
          @if (form.controls.email.touched && form.controls.email.invalid) {
            <mat-error>Email invalido</mat-error>
          }
        </mat-form-field>

        @if (feedback()) {
          <p class="feedback">{{ feedback() }}</p>
        }

        <button mat-flat-button color="primary" type="submit" [disabled]="loading()">
          {{ loading() ? 'Enviando...' : 'Enviar link' }}
        </button>
      </form>
    </mat-card-content>

    <mat-card-actions>
      <a routerLink="/login">Voltar ao login</a>
    </mat-card-actions>
  </mat-card>
</main>
