<main class="auth-shell">
  <section class="auth-copy">
    <div class="brand-row">
      <span class="brand-mark">TV</span>
      <app-theme-toggle />
    </div>
    <h1>Comece a desenhar sua proxima rota.</h1>
    <p>Guarde seus destinos, explore cidades reais e tenha as primeiras pistas do clima antes de montar o roteiro.</p>
    <div class="travel-photo" role="img" aria-label="Viajante observando uma paisagem"></div>
  </section>

  <mat-card class="auth-card" appearance="outlined">
    <mat-card-header>
      <mat-card-title>Registrar</mat-card-title>
      <mat-card-subtitle>Informe seus dados</mat-card-subtitle>
    </mat-card-header>

    <mat-card-content>
      <form [formGroup]="form" (ngSubmit)="submit()">
        <mat-form-field appearance="outline">
          <mat-label>Nome</mat-label>
          <input matInput formControlName="name" autocomplete="name">
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>Email</mat-label>
          <input matInput type="email" formControlName="email" autocomplete="email">
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>Senha</mat-label>
          <input matInput type="password" formControlName="password" autocomplete="new-password">
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>Confirmar senha</mat-label>
          <input matInput type="password" formControlName="password_confirmation" autocomplete="new-password">
        </mat-form-field>

        @if (error()) {
          <p class="feedback">{{ error() }}</p>
        }

        <button mat-flat-button color="primary" type="submit" [disabled]="loading()">
          {{ loading() ? 'Criando...' : 'Criar conta' }}
        </button>
      </form>
    </mat-card-content>

    <mat-card-actions>
      <a routerLink="/login">Ja tenho conta</a>
    </mat-card-actions>
  </mat-card>
</main>
